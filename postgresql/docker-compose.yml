services:
  postgres:
    image: postgres:16-alpine
    container_name: sequel-ace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sample_store
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sample_store"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
